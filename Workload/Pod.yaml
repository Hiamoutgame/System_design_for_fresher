apiVersion: v1
kind: Pod
metadata:
  name: hello-pod
  labels:
    app: hello-pod
spec:
  containers:
    - name: postgres
      image: postgres:15.3
      ports:
        - containerPort: 5432
      env:
        - name: POSTGRES_PASSWORD
          value: "MyStrongPassword123@"
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
