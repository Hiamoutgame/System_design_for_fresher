apiVersion: batch/v1
kind: Job
metadata:
  name: pi # job tính pi
spec:
  template:
    spec:
      containers:
        - name: pi
          image: perl:5.34.0
          command: ["perl", "-Mbignum=bpi", "-wle", "print bpi(2000)"] # chạy một lần
      restartPolicy: Never # hoàn thành xong không restart
  backoffLimit: 4 # thử lại tối đa 4 lần khi fail


#Job: chạy một lần, không có cơ chế rollout phiên bản, thường dùng cho tác vụ batch hoặc tính toán.
