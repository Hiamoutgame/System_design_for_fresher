apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello
spec:
  schedule: "* * * * *" # chạy mỗi phút
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: hello
              image: busybox:1.28
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - date; echo Hello from the Kubernetes cluster
          restartPolicy: OnFailure # chỉ restart khi job fail


#CronJob: chạy theo lịch định sẵn, tạo Job mới mỗi lần chạy, không có cơ chế rollout phiên bản. Thường dùng cho tác vụ định kỳ như backup, gửi email,...
