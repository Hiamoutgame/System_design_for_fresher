apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-pod-config
data:
  APP_NAME: "k8s-pod"
  LOG_LEVEL: "info"
  MESSAGE: "hello from configmap"
---
apiVersion: v1
kind: Secret
metadata:
  name: k8s-pod-secret
type: Opaque
stringData:
  API_KEY: "replace-me"
  PASSWORD: "replace-me"
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-pod-svc
  labels:
    app: k8s-pod
spec:
  selector:
    app: k8s-pod
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: k8s-pod-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: manual
  hostPath:
    path: /mnt/k8s-pod-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k8s-pod-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: manual
---
apiVersion: v1
kind: Pod
metadata:
  name: k8s-pod-with-configmap-volume
  labels:
    app: k8s-pod
spec:
  containers:
    - name: k8s-pod
      image: kanibot/k8s-pod:latest
      ports:
        - containerPort: 3000
      envFrom:
        - configMapRef:
            name: k8s-pod-config
      volumeMounts:
        - name: app-config
          mountPath: /etc/app-config
          readOnly: true
  volumes:
    - name: app-config
      configMap:
        name: k8s-pod-config
---
apiVersion: v1
kind: Pod
metadata:
  name: k8s-pod-with-secret
  labels:
    app: k8s-pod
spec:
  containers:
    - name: k8s-pod
      image: kanibot/k8s-pod:latest
      ports:
        - containerPort: 3000
      envFrom:
        - secretRef:
            name: k8s-pod-secret
      volumeMounts:
        - name: app-secret
          mountPath: /etc/app-secret
          readOnly: true
  volumes:
    - name: app-secret
      secret:
        secretName: k8s-pod-secret
---
apiVersion: v1
kind: Pod
metadata:
  name: k8s-pod-with-pvc
  labels:
    app: k8s-pod
spec:
  containers:
    - name: k8s-pod
      image: kanibot/k8s-pod:latest
      ports:
        - containerPort: 3000
      volumeMounts:
        - name: data
          mountPath: /data
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: k8s-pod-pvc
